<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#F8F7FF"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#6C5CE7" stroke-width="0.5" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Logo icon -->
  <g transform="translate(460, 120)">
    <rect width="120" height="120" rx="26" fill="#6C5CE7"/>
    <rect x="22" y="34" width="76" height="64" rx="8" fill="white" opacity="0.95"/>
    <rect x="22" y="34" width="76" height="17" rx="8" fill="white"/>
    <rect x="22" y="43" width="76" height="5" fill="white"/>
    <rect x="40" y="26" width="6" height="12" rx="3" fill="white"/>
    <rect x="74" y="26" width="6" height="12" rx="3" fill="white"/>
    <rect x="46" y="62" width="28" height="8" rx="3" fill="#6C5CE7"/>
    <rect x="52" y="56" width="16" height="20" rx="3" fill="#6C5CE7"/>
    <rect x="48" y="64" width="24" height="4" rx="2" fill="#6C5CE7"/>
  </g>

  <!-- Title -->
  <text x="600" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="#1a1a2e">
    MyDuty
    <tspan fill="#6C5CE7"> Connector</tspan>
  </text>

  <!-- Subtitle -->
  <text x="600" y="370" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#666680">
    마이듀티 공유 링크를 내 캘린더 일정으로 변환하세요
  </text>

  <!-- Bottom bar -->
  <rect x="0" y="600" width="1200" height="30" fill="#6C5CE7"/>
</svg>
